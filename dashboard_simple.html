<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinGo 30s Live Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .red { background-color: #ef4444; }
        .green { background-color: #22c55e; }
        .purple { background-color: #a855f7; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">
    <div class="max-w-4xl mx-auto p-6">
        <!-- Header -->
        <header class="flex justify-between items-center mb-8 border-b border-slate-700 pb-6">
            <div>
                <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
                    WinGo 30s
                </h1>
                <p class="text-slate-400 mt-1">Real-time Data Collector Dashboard</p>
            </div>
            <div id="status" class="flex items-center space-x-2 text-sm bg-slate-800 px-4 py-2 rounded-full border border-slate-700">
                <span class="relative flex h-3 w-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                </span>
                <span class="text-emerald-400 font-medium">Live Connection</span>
            </div>
        </header>

        <!-- Stats Card -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl">
                <p class="text-slate-400 text-sm">Latest Issue</p>
                <h3 id="last-issue" class="text-3xl font-mono font-bold text-white mt-1">---</h3>
            </div>
            <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl">
                <p class="text-slate-400 text-sm">Last Update</p>
                <h3 id="last-update" class="text-xl font-bold text-white mt-1">---</h3>
            </div>
        </div>

        <!-- Data Table -->
        <div class="bg-slate-800 rounded-3xl border border-slate-700 overflow-hidden shadow-2xl">
            <div class="p-6 border-b border-slate-700 flex justify-between items-center bg-slate-800/50">
                <h2 class="text-xl font-semibold">History Logs</h2>
                <button onclick="fetchData()" class="text-xs font-bold uppercase tracking-wider bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg transition-all">
                    Refresh
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-slate-500 text-xs uppercase tracking-widest border-b border-slate-700">
                            <th class="px-6 py-4 font-bold">Issue Number</th>
                            <th class="px-6 py-4 font-bold">Resul Color</th>
                            <th class="px-6 py-4 font-bold">Exact Time</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Data will be injected here -->
                    </tbody>
                </table>
                <div id="loading" class="p-20 text-center text-slate-500">
                    <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500 mb-4"></div>
                    <p>Connecting to Database...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURATION - UPDATE THESE WITH YOUR SUPABASE DETAILS
        const SUPABASE_URL = 'https://amhuejwptegjwohwfluk.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_7xsYTB6aSvii6Wu2kbFV2A_a8T37Ys7';

        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchData() {
            try {
                document.getElementById('loading').style.display = 'block';
                const { data, error } = await _supabase
                    .from('wingo_history')
                    .select('*')
                    .order('issue', { ascending: false })
                    .limit(50);

                if (error) throw error;

                const tableBody = document.getElementById('table-body');
                tableBody.innerHTML = '';
                
                if (data.length > 0) {
                    document.getElementById('last-issue').innerText = data[0].issue;
                    document.getElementById('last-update').innerText = new Date(data[0].timestamp).toLocaleTimeString();
                    
                    data.forEach(item => {
                        const row = document.createElement('tr');
                        row.className = 'border-b border-slate-700/50 hover:bg-slate-700/30 transition-colors';
                        
                        const colorClass = item.color === 'R' || item.color.toLowerCase().includes('red') ? 'red' :
                                           item.color === 'G' || item.color.toLowerCase().includes('green') ? 'green' : 'purple';
                        
                        row.innerHTML = `
                            <td class="px-6 py-4 font-mono text-sm text-slate-300">${item.issue}</td>
                            <td class="px-6 py-4">
                                <span class="dot ${colorClass}"></span>
                                <span class="uppercase font-bold text-xs">${item.color}</span>
                            </td>
                            <td class="px-6 py-4 text-xs text-slate-500">${new Date(item.timestamp).toLocaleString()}</td>
                        `;
                        tableBody.appendChild(row);
                    });
                }
                document.getElementById('loading').style.display = 'none';
            } catch (err) {
                console.error('Error:', err);
                document.getElementById('loading').innerHTML = '<p class="text-red-400">Failed to load data. Please check Supabase Config.</p>';
            }
        }

        // Initial fetch
        fetchData();
        // Refresh every 30 seconds
        setInterval(fetchData, 30000);
    </script>
</body>
</html>
